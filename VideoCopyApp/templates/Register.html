{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>VCDx — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080c10;--surface:#0d1117;--border:#1e2d3d;--teal:#00f5d4;--muted:#4d6278;--text:#c9d8e8}
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:40px 16px
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:40px 40px;opacity:.3;pointer-events:none;z-index:0
    }
    .back{
      position:fixed;top:24px;left:32px;z-index:10;
      font-family:'Space Mono',monospace;font-size:12px;
      color:var(--muted);text-decoration:none;letter-spacing:1px
    }
    .back:hover{color:var(--teal)}

    .card{
      position:relative;z-index:1;width:460px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:48px 40px;
      box-shadow:0 0 60px rgba(0,0,0,.6)
    }
    .card-label{
      font-family:'Space Mono',monospace;font-size:10px;
      color:var(--teal);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px
    }
    .card h2{font-size:1.6rem;font-weight:700;margin-bottom:6px}
    .card .sub{font-size:13px;color:var(--muted);margin-bottom:36px}

    .field{margin-bottom:18px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
    .field input{
      width:100%;padding:12px 16px;
      background:#111820;border:1px solid var(--border);
      border-radius:6px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;
      outline:none;transition:border-color .2s,box-shadow .2s
    }
    .field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,245,212,.1)}

    .msg-success{
      font-size:13px;color:var(--teal);
      background:rgba(0,245,212,.08);
      border:1px solid rgba(0,245,212,.2);
      border-radius:6px;padding:10px 14px;margin-bottom:20px
    }
    .msg-error{
      font-size:13px;color:#ff6b6b;
      background:rgba(255,107,107,.08);
      border:1px solid rgba(255,107,107,.2);
      border-radius:6px;padding:10px 14px;margin-bottom:20px
    }
    .btn-submit{
      width:100%;padding:13px;
      background:var(--teal);color:#080c10;
      border:none;border-radius:6px;
      font-size:15px;font-weight:700;font-family:'Sora',sans-serif;
      cursor:pointer;transition:all .2s;margin-top:8px
    }
    .btn-submit:hover{box-shadow:0 0 24px rgba(0,245,212,.35);opacity:.9}

    .footer-link{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}
    .footer-link a{color:var(--teal);text-decoration:none}
    .footer-link a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <a class="back" href="{% url 'index' %}">← HOME</a>

  <div class="card">
    <div class="card-label">New Account</div>
    <h2>Create account</h2>
    <p class="sub">Join the video copy detection platform</p>

    {% if data and data != "none" %}
      {% if "successful" in data %}
        <div class="msg-success">{{ data }}</div>
      {% else %}
        <div class="msg-error">{{ data }}</div>
      {% endif %}
    {% endif %}

    <form method="post" action="{% url 'RegisterAction' %}">
      {% csrf_token %}
      <div class="field">
        <label>USERNAME</label>
        <input type="text" name="t1" placeholder="choose_username" required/>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" name="t2" placeholder="••••••••" required/>
      </div>
      <div class="field">
        <label>CONTACT NUMBER</label>
        <input type="tel" name="t3" placeholder="+1 555 000 0000" required/>
      </div>
      <div class="field">
        <label>EMAIL ADDRESS</label>
        <input type="email" name="t4" placeholder="you@example.com" required/>
      </div>
      <div class="field">
        <label>ADDRESS</label>
        <input type="text" name="t5" placeholder="Street, City, Country" required/>
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="footer-link">
      Already registered? <a href="{% url 'UserLogin' %}">Sign in here</a>
    </div>
  </div>
</body>
</html>
